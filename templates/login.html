<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Crop Disease Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #d1e7dd; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #ffffff;
            border-radius: 25px;
            width: 100%;
            max-width: 500px; /* Reduced from 550px for better fit */
            padding: 40px;    /* Balanced padding */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .green-dot {
            width: 50px;
            height: 50px;
            background-color: #198754;
            border-radius: 50%;
            margin: 0 auto 20px;
        }
        h1 { 
            color: #198754; 
            font-size: 2.8rem; /* Large but fits on one line */
            font-weight: 800;
            margin-bottom: 5px;
        }
        .sub-text {
            font-size: 1.1rem;
            color: #6c757d;
            margin-bottom: 30px;
        }
        .form-label {
            display: block;
            text-align: left;
            font-size: 1.2rem;
            font-weight: 700;
            color: #212529;
            margin-bottom: 8px;
        }
        .form-control-lg {
            height: 55px;
            font-size: 1.1rem;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .btn-success {
            background-color: #198754;
            border: none;
            padding: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 12px;
            width: 100%;
            margin-top: 10px;
        }
        .extra-links {
            margin-top: 20px;
            font-size: 1rem;
        }
        .forgot-password {
            float: right;
            color: #198754;
            font-weight: 700;
            text-decoration: none;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="green-dot"></div>
        <h1>Welcome Back</h1>
        <p class="sub-text">Login to your account</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control form-control-lg" placeholder="Enter your email" required>

            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter your password" required>
            
            <a href="/forgot-password" class="forgot-password">Forgot Password?</a>

            <button type="submit" class="btn btn-success shadow-sm">Login</button>

            <div class="extra-links">
                <span class="text-muted">Don't have an account?</span> 
                <a href="/signup" class="text-success fw-bold text-decoration-none">Sign Up</a>
            </div>
        </form>
    </div>

</body>
</html>
