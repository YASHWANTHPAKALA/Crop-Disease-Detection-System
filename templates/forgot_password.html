<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Account - AI Crop Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-success-subtle">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4" style="width: 100%; max-width: 400px; border-radius: 20px;">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <div class="text-center mb-4">
                <div class="bg-success text-white rounded-circle d-inline-block p-3 mb-2">
                    <i class="bi bi-envelope-fill"></i>
                </div>
                <h3 class="fw-bold text-success">Forgot Password?</h3>
                <p class="text-muted small">Enter your email to receive a verification code</p>
            </div>
            
            <form action="/send-otp" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Email Address</label>
                    <input type="email" name="email" class="form-control form-control-lg" placeholder="name@example.com" required>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 fw-bold shadow-sm">Send OTP</button>
                <div class="text-center mt-3">
                    <a href="/" class="text-success text-decoration-none small">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
