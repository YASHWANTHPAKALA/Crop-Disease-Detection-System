<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - AI Crop Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-success-subtle">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4 text-center" style="width: 100%; max-width: 400px; border-radius: 20px;">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show text-start" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <h3 class="fw-bold text-success mb-2">Verify OTP</h3>
            <p class="text-muted small">Enter the 6-digit code sent to your email.</p>
            
            <form action="/verify-otp" method="POST">
                <div class="d-flex justify-content-between mb-4 mt-3 gap-2">
                    <input type="text" name="otp1" maxlength="1" class="form-control otp-box" required>
                    <input type="text" name="otp2" maxlength="1" class="form-control otp-box" required>
                    <input type="text" name="otp3" maxlength="1" class="form-control otp-box" required>
                    <input type="text" name="otp4" maxlength="1" class="form-control otp-box" required>
                    <input type="text" name="otp5" maxlength="1" class="form-control otp-box" required>
                    <input type="text" name="otp6" maxlength="1" class="form-control otp-box" required>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Verify Code</button>
            </form>
        </div>
    </div>

    <script>
    // Auto-advance OTP input boxes
    document.querySelectorAll('.otp-box').forEach((input, index, inputs) => {
        input.addEventListener('input', () => {
            if (input.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && input.value === '' && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });
    </script>
</body>
</html>
